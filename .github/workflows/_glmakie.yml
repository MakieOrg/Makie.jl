name: GLMakie
on:
  workflow_call:

jobs:
  setup:
    name: Setup GLMakie Julia ${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['1.10', '1']
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v3
        with:
          cache-name: julia-cache-glmakie-${{ matrix.version }}
          include-matrix: false
      - run: sudo apt-get update && sudo apt-get install -y xorg-dev mesa-utils xvfb libgl1 freeglut3-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev xsettingsd x11-xserver-utils
      - name: Install Julia dependencies
        shell: julia --project=monorepo {0}
        run: |
          using Pkg;
          pkg"registry up"
          Pkg.update()
          pkg"dev ./Makie ./GLMakie ./ReferenceTests ./ComputePipeline"
      - name: Precompile via Pkg.test
        env:
          PRECOMPILE_ONLY: 'true'
        run: >
          DISPLAY=:0 xvfb-run -s '-screen 0 1024x768x24'
          julia --color=yes --project=monorepo -e 'using Pkg; Pkg.test("GLMakie")'
      - name: Upload Julia depot
        uses: actions/upload-artifact@v7
        with:
          name: julia-depot-glmakie-${{ matrix.version }}
          path: |
            ~/.julia/compiled
            ~/.julia/packages
            ~/.julia/artifacts
          retention-days: 1

  test:
    name: GLMakie Julia ${{ matrix.version }} bucket ${{ matrix.bucket }}/2
    needs: setup
    env:
      MODERNGL_DEBUGGING: "true"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['1.10', '1']
        bucket: [1, 2]
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - name: Download Julia depot
        uses: actions/download-artifact@v8
        with:
          name: julia-depot-glmakie-${{ matrix.version }}
          path: ~/.julia
      - run: sudo apt-get update && sudo apt-get install -y xorg-dev mesa-utils xvfb libgl1 freeglut3-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev xsettingsd x11-xserver-utils
      - name: Install Julia dependencies
        shell: julia --project=monorepo {0}
        run: |
          using Pkg;
          pkg"registry up"
          Pkg.update()
          pkg"dev ./Makie ./GLMakie ./ReferenceTests ./ComputePipeline"
      - name: Run the tests
        id: referencetests
        continue-on-error: true
        env:
          REFTEST_BUCKET: ${{ matrix.bucket }}
          REFTEST_NBUCKETS: '2'
        run: >
          DISPLAY=:0 xvfb-run -s '-screen 0 1024x768x24' julia --color=yes --project=monorepo -e 'using Pkg; Pkg.test("GLMakie", coverage=true)'
          && echo "TESTS_SUCCESSFUL=true" >> $GITHUB_ENV
      - name: Upload test Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ReferenceImages_GLMakie_${{ matrix.version }}_${{ matrix.bucket }}
          path: |
            ./GLMakie/test/reference_images/
      - name: Fail after artifacts if tests failed
        if: ${{ env.TESTS_SUCCESSFUL != 'true' }}
        run: exit 1
      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: Makie/src
      - uses: codecov/codecov-action@v6
        with:
          file: lcov.info
