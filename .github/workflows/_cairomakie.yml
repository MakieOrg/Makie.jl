name: CairoMakie
on:
  workflow_call:

jobs:
  test:
    name: CairoMakie Julia ${{ matrix.version }} bucket ${{ matrix.bucket }}/4
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'
          - '1'
        os:
          - ubuntu-latest
        arch:
          - x64
        bucket: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
        with:
          cache-name: julia-cache-cairomakie-${{ matrix.version }}
          include-matrix: false
      - name: Install Julia dependencies
        shell: julia --project=monorepo {0}
        run: |
          using Pkg;
          # dev mono repo versions
          pkg"registry up"
          Pkg.update()
          pkg"dev ./Makie ./CairoMakie ./ReferenceTests ./ComputePipeline"
      - name: Run the tests
        continue-on-error: true
        env:
          REFTEST_BUCKET: ${{ matrix.bucket }}
          REFTEST_NBUCKETS: '4'
        run: >
          julia --color=yes --project=monorepo -e 'using Pkg; Pkg.test("CairoMakie", coverage=true)'
          && echo "TESTS_SUCCESSFUL=true" >> $GITHUB_ENV
      - name: Upload test Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ReferenceImages_CairoMakie_${{ matrix.version }}_${{ matrix.bucket }}
          path: ./CairoMakie/test/reference_images/
      - name: Fail after artifacts if tests failed
        if: ${{ env.TESTS_SUCCESSFUL != 'true' }}
        run: exit 1
      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: Makie/src
      - uses: codecov/codecov-action@v6
        with:
          file: lcov.info
