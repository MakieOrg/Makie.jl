name: CI
on:
  pull_request:
    branches:
      - master
  push:
    tags:
      - '*'
    branches:
      - master
      - 'release-*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  makie:
    name: Julia ${{ matrix.version }}
    needs: [codespell, formatting]

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'
          - '1'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - name: Develop and test Makie
        shell: julia --project=monorepo {0}
        run: |
          using Pkg
          # dev mono repo versions
          pkg"registry up"
          Pkg.update()
          pkg"dev ./Makie ./ComputePipeline"
          Pkg.test("Makie"; coverage=true)

      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: Makie/src
      - uses: codecov/codecov-action@v6
        with:
          file: lcov.info

  codespell:
    name: Codespell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: codespell-project/actions-codespell@v2
        with:
          ignore_words_list: indexin,doubleclick,Heros,OT,jus,bu,te,lins,Missings
          skip: '*.js,*.vert,*.ai,*.frag,*.geom'
          only_warn: 1

  formatting:
    name: Runic formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v3
      - uses: fredrikekre/runic-action@v1
        with:
          version: '1.4'

  compute-pipeline:
    name: ComputePipeline Julia ${{ matrix.version }}
    needs: [codespell, formatting]

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.9'
          - '1'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - name: Develop and test ComputePipeline
        shell: julia --project=monorepo {0}
        run: |
          using Pkg
          # dev mono repo versions
          pkg"registry up"
          Pkg.update()
          pkg"dev ./ComputePipeline"
          Pkg.test("ComputePipeline")

  cairomakie:
    name: CairoMakie Julia ${{ matrix.version }}
    needs: [codespell, formatting]

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'
          - '1'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - name: Install Julia dependencies
        shell: julia --project=monorepo {0}
        run: |
          using Pkg;
          # dev mono repo versions
          pkg"registry up"
          Pkg.update()
          pkg"dev ./Makie ./CairoMakie ./ReferenceTests ./ComputePipeline"
      - name: Run the tests
        continue-on-error: true
        run: >
          julia --color=yes --project=monorepo -e 'using Pkg; Pkg.test("CairoMakie", coverage=true)'
          && echo "TESTS_SUCCESSFUL=true" >> $GITHUB_ENV
      - name: Upload test Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ReferenceImages_CairoMakie_${{ matrix.version }}
          path: ./CairoMakie/test/reference_images/
      - name: Fail after artifacts if tests failed
        if: ${{ env.TESTS_SUCCESSFUL != 'true' }}
        run: exit 1
      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: Makie/src
      - uses: codecov/codecov-action@v6
        with:
          file: lcov.info

  glmakie:
    name: GLMakie Julia ${{ matrix.version }}
    needs: [codespell, formatting]

    env:
      MODERNGL_DEBUGGING: "true"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'
          - '1'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - run: sudo apt-get update && sudo apt-get install -y xorg-dev mesa-utils xvfb libgl1 freeglut3-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev xsettingsd x11-xserver-utils
      - name: Install Julia dependencies
        shell: julia --project=monorepo {0}
        run: |
          using Pkg;
          # dev mono repo versions
          pkg"registry up"
          Pkg.update()
          pkg"dev ./Makie ./GLMakie ./ReferenceTests ./ComputePipeline"
      - name: Run the tests
        id: referencetests
        continue-on-error: true
        run: >
          DISPLAY=:0 xvfb-run -s '-screen 0 1024x768x24' julia --color=yes --project=monorepo -e 'using Pkg; Pkg.test("GLMakie", coverage=true)'
          && echo "TESTS_SUCCESSFUL=true" >> $GITHUB_ENV
      - name: Upload test Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ReferenceImages_GLMakie_${{ matrix.version }}
          path: |
            ./GLMakie/test/reference_images/
      - name: Fail after artifacts if tests failed
        if: ${{ env.TESTS_SUCCESSFUL != 'true' }}
        run: exit 1
      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: Makie/src
      - uses: codecov/codecov-action@v6
        with:
          file: lcov.info

  wglmakie:
    name: WGLMakie Julia ${{ matrix.version }}
    needs: [codespell, formatting]

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'
          - '1'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - run: sudo apt-get update && sudo apt-get install -y xorg-dev libosmesa6 libgl1-mesa-dri mesa-utils xvfb libgl1 freeglut3-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev
      - name: Install Julia dependencies
        shell: julia --project=monorepo {0}
        run: |
          using Pkg;
          # dev mono repo versions
          pkg"registry up"
          Pkg.update()
          pkg"dev ./Makie ./WGLMakie ./ReferenceTests ./ComputePipeline"
      - name: Run the tests
        continue-on-error: true
        run: >
          DISPLAY=:0 xvfb-run -s '-screen 0 2048x2048x24' julia --color=yes --project=monorepo -e 'using Pkg; Pkg.test("WGLMakie", coverage=true)'
          && echo "TESTS_SUCCESSFUL=true" >> $GITHUB_ENV
      - name: Upload test Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ReferenceImages_WGLMakie_${{ matrix.version }}
          path: ./WGLMakie/test/reference_images/
      - name: Upload test Electron logs
        uses: actions/upload-artifact@v7
        with:
          name: Electron_Logs_WGLMakie_${{ matrix.version }}
          path: ./WGLMakie/test/electron.log
      - name: Fail after artifacts if tests failed
        if: ${{ env.TESTS_SUCCESSFUL != 'true' }}
        run: exit 1
      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: Makie/src
      - uses: codecov/codecov-action@v6
        with:
          file: lcov.info

  consolidation:
    name: Merge artifacts
    runs-on: ubuntu-latest
    if: always()
    needs: [cairomakie, glmakie, wglmakie]
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: ReferenceImages_WGLMakie_1
          path: ./ReferenceImages/WGLMakie
      - uses: actions/download-artifact@v8
        with:
          name: ReferenceImages_CairoMakie_1
          path: ./ReferenceImages/CairoMakie
      - uses: actions/download-artifact@v8
        with:
          name: ReferenceImages_GLMakie_1
          path: ./ReferenceImages/GLMakie
      - name: Consolidate reference image folders
        run: |
          baseDir="./ReferenceImages"

          # Create new top-level directory for combined files
          mkdir -p "./ReferenceImagesCombined"

          # Copy the reference folder from GLMakie, it's the same for all backends
          cp -r "${baseDir}/GLMakie/reference/." "./ReferenceImagesCombined/reference/"

          # Initialize empty files for concatenation
          > "./ReferenceImagesCombined/scores.tsv"
          > "./ReferenceImagesCombined/new_files.txt"

          # Loop through the directories and concatenate the files, and copy recorded folders
          for dir in WGLMakie CairoMakie GLMakie; do
              # Concatenate scores.tsv, new_files.txt and missing_files.txt
              cat "${baseDir}/${dir}/scores.tsv" >> "./ReferenceImagesCombined/scores.tsv"
              cat "${baseDir}/${dir}/new_files.txt" >> "./ReferenceImagesCombined/new_files.txt"
              cat "${baseDir}/${dir}/missing_files.txt" >> "./ReferenceImagesCombined/missing_files.txt"

              # Copy recorded folder
              mkdir -p "./ReferenceImagesCombined/recorded/${dir}/"
              cp -r "${baseDir}/${dir}/recorded/${dir}/." "./ReferenceImagesCombined/recorded/${dir}/"
          done

          echo "Files and folders have been successfully combined into ReferenceImagesCombined."
      - uses: actions/upload-artifact@v7
        with:
          name: ReferenceImages
          path: ./ReferenceImagesCombined/
      - name: Save number of missing refimages to file
        env:
          COMMIT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          mkdir -p ./n_missing
          N_MISSING=$(wc -l < ./ReferenceImagesCombined/new_files.txt)
          echo $N_MISSING > ./n_missing/n_missing_refimages
          echo $COMMIT_SHA >> ./n_missing/n_missing_refimages
      - name: Upload artifact with number of missing refimages
        uses: actions/upload-artifact@v7
        with:
          name: n_missing_refimages
          path: n_missing/

  rprmakie:
    name: RPRMakie Julia ${{ matrix.version }}
    needs: [codespell, formatting]

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - name: Install Julia dependencies
        shell: julia --project=monorepo {0}
        run: |
          using Pkg;
          pkg"registry up"
          Pkg.update()
          # dev mono repo versions
          pkg"dev ./ComputePipeline ./Makie ./RPRMakie ./ReferenceTests"
      - name: Run the tests
        continue-on-error: true
        run: >
          julia --color=yes --project=monorepo -e 'using Pkg; Pkg.test("RPRMakie", coverage=true)'
          && echo "TESTS_SUCCESSFUL=true" >> $GITHUB_ENV
      - name: Upload test Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ReferenceImages_${{ matrix.os }}_${{ matrix.arch }}_${{ matrix.version }}
          path: ./RPRMakie/test/recorded
      - name: Fail after artifacts if tests failed
        if: ${{ env.TESTS_SUCCESSFUL != 'true' }}
        run: exit 1
      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: Makie/src
      - uses: codecov/codecov-action@v6
        with:
          file: lcov.info

  relocatability:
    name: Relocatability ${{ matrix.backend }}
    needs: [codespell, formatting]

    env:
      MODERNGL_DEBUGGING: "true"
      JULIA_NUM_PRECOMPILE_TAKS: 1
      JULIA_NUM_THREADS: 1
      JULIA_IMAGE_THREADS: 2
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'
        os:
          - ubuntu-latest
        arch:
          - x64
        backend:
          - GLMakie
          - WGLMakie
          - CairoMakie
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - name: Install dependencies for GPU backends
        if: matrix.backend != 'CairoMakie'
        run: sudo apt-get update && sudo apt-get install -y xorg-dev mesa-utils xvfb libgl1 freeglut3-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev xsettingsd x11-xserver-utils
      - name: Relocatability test
        run: |
          if [ "${{ matrix.backend }}" != "CairoMakie" ]; then
            DISPLAY=:0 xvfb-run -s '-screen 0 1024x768x24' julia --color=yes ./relocatability.jl ${{ matrix.backend }}
          else
            julia --color=yes ./relocatability.jl ${{ matrix.backend }}
          fi

  docs:
    name: Docs build and deploy
    needs: [codespell, formatting]

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      # NOTE: Python is necessary for the pre-rendering (minification) step
      - name: Install python
        uses: actions/setup-python@v6
        with:
          python-version: '3.8'
      - name: Install binary dependencies
        run: sudo apt-get update && sudo apt-get install -y xorg-dev mesa-utils xvfb libgl1 freeglut3-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev
      # NOTE: Here you can install dependencies such as matplotlib if you use
      # packages such as PyPlot.
      # - run: pip install matplotlib
      - name: Install Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v3
      - name: Build and deploy docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
            cd docs;
            DISPLAY=:0 xvfb-run -s '-screen 0 1024x768x24'
            julia --color=yes makedocs.jl
      - name: Upload site as artifact
        uses: actions/upload-artifact@v7
        with:
          name: Docs build
          path: ./docs/build

  refimage-status:
    name: Reference image status
    runs-on: ubuntu-latest
    needs: [consolidation]
    if: always() && needs.consolidation.result == 'success'
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: n_missing_refimages
      - name: Check for missing reference images
        run: |
          N_MISSING=$(head -1 n_missing_refimages)
          echo "$N_MISSING missing reference image(s)"
          if [ "$N_MISSING" -ne 0 ]; then
            echo "::error::$N_MISSING missing reference image(s) must be uploaded"
            exit 1
          fi

  finalize:
    name: CI result
    runs-on: ubuntu-latest
    if: always()
    needs: [codespell, formatting, makie, compute-pipeline, cairomakie, glmakie, wglmakie, consolidation, rprmakie, relocatability, docs, refimage-status]
    steps:
      - run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: $results"
          if echo "$results" | grep -qE '"(failure|cancelled)"'; then
            echo "Some required jobs failed or were cancelled"
            exit 1
          fi
