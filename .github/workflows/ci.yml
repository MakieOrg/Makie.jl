name: CI
on:
  pull_request:
    branches:
      - master
  push:
    tags:
      - '*'
    branches:
      - master
      - 'release-*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  codespell:
    uses: ./.github/workflows/_codespell.yml

  formatting:
    uses: ./.github/workflows/_formatting.yml

  makie:

    uses: ./.github/workflows/_makie.yml

  compute-pipeline:

    uses: ./.github/workflows/_compute-pipeline.yml

  reference-tests:

    uses: ./.github/workflows/_reference-tests.yml

  rprmakie:

    uses: ./.github/workflows/_rprmakie.yml

  relocatability:

    uses: ./.github/workflows/_relocatability.yml

  docs:

    uses: ./.github/workflows/_docs.yml
    secrets: inherit

  finalize:
    name: CI result
    runs-on: ubuntu-latest
    if: always()
    needs: [codespell, formatting, makie, compute-pipeline, reference-tests, rprmakie, relocatability, docs]
    steps:
      - run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: $results"
          if echo "$results" | grep -qE '"(failure|cancelled)"'; then
            echo "Some required jobs failed or were cancelled"
            exit 1
          fi
