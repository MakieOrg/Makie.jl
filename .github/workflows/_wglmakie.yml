name: WGLMakie
on:
  workflow_call:

jobs:
  setup:
    name: Setup WGLMakie Julia ${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['1.10', '1']
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v3
        with:
          cache-name: julia-cache-wglmakie-${{ matrix.version }}
          include-matrix: false
      - run: sudo apt-get update && sudo apt-get install -y xorg-dev libosmesa6 libgl1-mesa-dri mesa-utils xvfb libgl1 freeglut3-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev
      - name: Install Julia dependencies
        shell: julia --project=monorepo {0}
        run: |
          using Pkg;
          pkg"registry up"
          Pkg.update()
          pkg"dev ./Makie ./WGLMakie ./ReferenceTests ./ComputePipeline"
      - name: Precompile via Pkg.test
        env:
          PRECOMPILE_ONLY: 'true'
        run: >
          DISPLAY=:0 xvfb-run -s '-screen 0 2048x2048x24'
          julia --color=yes --project=monorepo -e 'using Pkg; Pkg.test("WGLMakie")'

  test:
    name: WGLMakie Julia ${{ matrix.version }} bucket ${{ matrix.bucket }}/4
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['1.10', '1']
        bucket: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v3
        with:
          cache-name: julia-cache-wglmakie-${{ matrix.version }}
          include-matrix: false
      - run: sudo apt-get update && sudo apt-get install -y xorg-dev libosmesa6 libgl1-mesa-dri mesa-utils xvfb libgl1 freeglut3-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev
      - name: Install Julia dependencies
        shell: julia --project=monorepo {0}
        run: |
          using Pkg;
          pkg"registry up"
          Pkg.update()
          pkg"dev ./Makie ./WGLMakie ./ReferenceTests ./ComputePipeline"
      - name: Run the tests
        continue-on-error: true
        env:
          REFTEST_BUCKET: ${{ matrix.bucket }}
          REFTEST_NBUCKETS: '4'
        run: >
          DISPLAY=:0 xvfb-run -s '-screen 0 2048x2048x24' julia --color=yes --project=monorepo -e 'using Pkg; Pkg.test("WGLMakie", coverage=true)'
          && echo "TESTS_SUCCESSFUL=true" >> $GITHUB_ENV
      - name: Upload test Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ReferenceImages_WGLMakie_${{ matrix.version }}_${{ matrix.bucket }}
          path: ./WGLMakie/test/reference_images/
      - name: Upload test Electron logs
        uses: actions/upload-artifact@v7
        with:
          name: Electron_Logs_WGLMakie_${{ matrix.version }}_${{ matrix.bucket }}
          path: ./WGLMakie/test/electron.log
      - name: Fail after artifacts if tests failed
        if: ${{ env.TESTS_SUCCESSFUL != 'true' }}
        run: exit 1
      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: Makie/src
      - uses: codecov/codecov-action@v6
        with:
          file: lcov.info
