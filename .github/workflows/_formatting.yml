name: Formatting
on:
  workflow_call:

jobs:
  runic:
    name: Runic formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v3
      - uses: fredrikekre/runic-action@v1
        with:
          version: '1.4'
